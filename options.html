<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>飞书同步设置</title>
    <style>
      :root {
        --bg: #f7f8fa;
        --card: #ffffff;
        --text: #1f2329;
        --muted: #6b7280;
        --border: #e5e7eb;
        --brand: #1677ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .wrap {
        max-width: 820px;
        margin: 24px auto;
        padding: 0 16px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 18px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 22px;
      }

      p.tip {
        margin: 0 0 14px;
        color: var(--muted);
        font-size: 14px;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .field.full {
        grid-column: 1 / -1;
      }

      label {
        font-size: 13px;
      }

      input[type="text"],
      input[type="password"],
      select {
        width: 100%;
        height: 38px;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0 10px;
        font-size: 14px;
      }

      .check {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
      }

      .actions {
        margin-top: 16px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      button {
        border: none;
        height: 38px;
        border-radius: 8px;
        padding: 0 14px;
        cursor: pointer;
        font-size: 14px;
      }

      .primary {
        background: var(--brand);
        color: #fff;
      }

      .ghost {
        background: #eef0f4;
        color: #333;
      }

      #status {
        font-size: 13px;
        color: var(--muted);
      }

      .hint {
        margin-top: 10px;
        font-size: 12px;
        color: #64748b;
        line-height: 1.6;
      }

      details {
        margin-top: 16px;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
      }

      summary {
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
      }

      .preview {
        margin-top: 10px;
        font-size: 12px;
        color: #374151;
        line-height: 1.7;
        background: #f8fafc;
        border: 1px dashed #cbd5e1;
        border-radius: 8px;
        padding: 8px 10px;
      }

      .note {
        margin-top: 14px;
        padding: 10px 12px;
        background: #eef6ff;
        border: 1px solid #bfdcff;
        border-radius: 8px;
        font-size: 13px;
        line-height: 1.6;
      }

      @media (max-width: 640px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>飞书同步设置</h1>
        <p class="tip">默认只需要填写「飞书表格完整链接 + 应用密钥（App Secret）」即可。</p>

        <div class="grid">
          <div class="field full">
            <label for="tableUrl">飞书表格完整链接</label>
            <input
              id="tableUrl"
              type="text"
              placeholder="https://xxx.feishu.cn/wiki/...?...table=tblxxxx 或 https://xxx.feishu.cn/base/xxxxx?..."
            />
          </div>

          <div class="field full">
            <label for="robotSecret">应用密钥（App Secret）</label>
            <input id="robotSecret" type="password" placeholder="填写飞书开放平台应用的 App Secret（不是机器人 Webhook 密钥）" />
          </div>
        </div>

        <div class="hint">首次使用如果未配置过 App ID，请展开“高级设置”补充一次，后续可不再填写。</div>

        <details>
          <summary>高级设置（首次可填一次）</summary>

          <div class="grid" style="margin-top:12px;">
            <div class="field">
              <label for="appId">App ID（首次必填）</label>
              <input id="appId" type="text" placeholder="cli_xxx" />
            </div>

            <div class="field">
              <label for="userIdType">user_id_type</label>
              <select id="userIdType">
                <option value="open_id">open_id（默认）</option>
                <option value="user_id">user_id</option>
                <option value="union_id">union_id</option>
              </select>
            </div>

            <div class="field full check">
              <input id="autoCreateFields" type="checkbox" />
              <label for="autoCreateFields">自动在飞书中创建缺失字段（文本类型）</label>
            </div>

            <div class="field full check">
              <input id="includeMetaFields" type="checkbox" />
              <label for="includeMetaFields">写入来源页面和抓取时间</label>
            </div>

            <div class="field full check">
              <input id="skipOperationColumn" type="checkbox" />
              <label for="skipOperationColumn">跳过“操作/Action”列</label>
            </div>

            <div class="field full check">
              <input id="ignoreConsistencyCheck" type="checkbox" />
              <label for="ignoreConsistencyCheck">batch_create 使用 ignore_consistency_check=true（提升性能）</label>
            </div>

            <div class="field full check">
              <input id="enableDedup" type="checkbox" />
              <label for="enableDedup">同步前去重：检测到重复记录则跳过不写入</label>
            </div>

            <div class="field full">
              <label for="dedupeFields">去重字段（可选，英文逗号分隔）</label>
              <input id="dedupeFields" type="text" placeholder="例如：电话,线索创建时间（不填则自动用电话/手机号等字段）" />
            </div>
          </div>

          <div class="preview">
            解析预览：<br />
            App Token：<span id="previewAppToken">-</span><br />
            Table ID：<span id="previewTableId">-</span>
          </div>
        </details>

        <div class="actions">
          <button class="primary" id="saveBtn">保存设置</button>
          <button class="ghost" id="openFeishuBtn">打开飞书开放平台</button>
          <span id="status"></span>
        </div>

        <div class="note">
          说明：这里必须是飞书开放平台应用的 App Secret；机器人 Webhook 的 SEC 开头密钥不能用于调用多维表格 API。
        </div>
      </div>
    </div>

    <script src="options.js"></script>
  </body>
</html>
